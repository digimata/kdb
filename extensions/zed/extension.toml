id = "kdb"
name = "kdb"
version = "0.0.1"
schema_version = 1
authors = ["andjones"]
description = "Wire the kdb language server into Markdown in Zed"
repository = "https://github.com/andjones/kdb"

[lib]
kind = "Rust"
version = "0.7.0"

[language_servers.kdb]
name = "kdb"
languages = ["Markdown", "Rust", "TypeScript", "TSX", "JavaScript", "Python", "Go"]

[language_servers.kdb.language_ids]
Markdown = "markdown"
Rust = "rust"
TypeScript = "typescript"
TSX = "typescriptreact"
JavaScript = "javascript"
Python = "python"
Go = "go"
