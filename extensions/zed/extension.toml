id = "qmd"
name = "qmd"
version = "0.0.1"
schema_version = 1
authors = ["andjones"]
description = "Wire the qmd language server into Markdown in Zed"
repository = "https://github.com/andjones/qmd"

[lib]
kind = "Rust"
version = "0.7.0"

[language_servers.qmd]
name = "qmd"
languages = ["Markdown", "Rust", "TypeScript", "TSX", "JavaScript", "Python", "Go"]

[language_servers.qmd.language_ids]
Markdown = "markdown"
Rust = "rust"
TypeScript = "typescript"
TSX = "typescriptreact"
JavaScript = "javascript"
Python = "python"
Go = "go"
